# Resume Screener Configuration
# Multi-role support

roles:
# Role 1: Talent Engineering Lead, India
  - job_id: "3460fc9f-f3e6-46c2-b846-1a2fb1017b9a"
    job_title: "Talent Engineering Lead, India"
    threshold: 7.0
    archive_threshold: 5.0
    archive_stage_id: "02014856-e5b9-4d98-8a7c-46868fda8484"
    archive_reason_id: "1f6c3fe3-c08c-4fe0-8f49-da8e632b5f91"
    criteria:
      - name: "systems_building_ai_engineering"
        label: "Systems Building & AI Engineering"
        weight: 0.40
        description: |
          Score 1-10. Has the candidate built and shipped production AI systems end-to-end?
          Look for: agents, pipelines, automations using Claude Code, Clay, Cursor, Railway, n8n, or equivalent.
          Evidence of architecting full workflows — not just prompting or light config.
          Fast-track if: GitHub/portfolio with live deployed projects, or title is Forward Deployed Engineer,
          GTM Engineer, AI Engineer, or RevOps Engineer at a startup.
          Auto-archive if score is 2 or below, regardless of total.

      - name: "outbound_motion_pipeline_thinking"
        label: "Outbound Motion & Pipeline Thinking"
        weight: 0.30
        description: |
          Score 1-10. Has the candidate owned a full outbound motion — segmentation, scoring,
          sequencing, A/B testing — in sales, recruiting, or growth?
          Look for: designed the system (not just executed within it), fluency with conversion metrics,
          sourcing or SDR experience, pipeline ownership.

      - name: "startup_operating_orientation"
        label: "Startup Operating Experience & Orientation"
        weight: 0.20
        description: |
          Score 1-10. Has the candidate built in early-stage or high-growth environments?
          Look for: comfort with ambiguity, cross-functional ownership, operating without playbooks,
          shipping under constraints. Penalize exclusively large-company or process-dependent backgrounds.

      - name: "venture_investing_experience"
        label: "Experience in Venture or Startup Investing"
        weight: 0.05
        description: |
          Score 1-10. Has the candidate worked in or alongside venture capital or a venture studio?
          Look for: VC firm experience, accelerator roles, founder background, or close investor relationships.
          Nice-to-have signal, not a requirement.

      - name: "recruiting_domain_fluency"
        label: "Recruiting Domain Fluency"
        weight: 0.05
        description: |
          Score 1-10. Does the candidate have direct recruiting or talent acquisition experience?
          Look for: full-cycle recruiting ownership, sourcing, ATS experience, candidate-facing work.
          Supporting dimension only — strong engineering profile can compensate for a low score here.

  # Role 2: Executive Assistant & Workplace Operations
  - job_id: "63841c46-29a8-40dc-8184-0c6cf7407ccc"
    job_title: "Executive Assistant & Workplace Operations"
    threshold: 7.0
    archive_threshold: 6.0
    archive_stage_id: "02014856-e5b9-4d98-8a7c-46868fda8484"
    archive_reason_id: "1f6c3fe3-c08c-4fe0-8f49-da8e632b5f91"
    nyc_hard_gate: true  # If not in NYC, do not alert regardless of score

    criteria:
      - name: "ea_experience"
        label: "EA or Relevant Experience"
        weight: "high"
        description: |
          Strong preference for executive assistant experience. Chief of Staff, business operations,
          or office management is also relevant. Must have 4+ years total experience.

      - name: "years_experience_fit"
        label: "Years of Experience Fit"
        weight: "high"
        description: |
          Ideal range is 3-11 years of total professional experience.
          Candidates with 15+ years should score very low (2 or below) on this dimension.
          Candidates with less than 2 years should also score low.

      - name: "startup_vc_background"
        label: "Startup/VC Background"
        weight: "high"
        description: |
          Preference for candidates who have worked at startups, venture capital firms, or venture studios.
          Large corporate-only backgrounds are a negative signal.

      - name: "job_stability"
        label: "Job Stability"
        weight: "medium"
        description: |
          Negative signal if the candidate has less than 2 years at most of their roles or shows
          frequent job hopping. Reward candidates with longer tenures, but not beyond 8+ years
          in a single role (may indicate lack of growth).

      - name: "education"
        label: "Education"
        weight: "low_medium"
        description: |
          Preference for candidates who attended a top 100 US university.
          Not a dealbreaker but a positive signal.

      - name: "ai_tech_savvy"
        label: "AI & Technology Savviness"
        weight: "low_medium"
        description: |
          Bonus points for any experience with AI tools, scheduling automation, or demonstrated
          interest in using technology to improve productivity.

  # Role 3: Managing Director of New Ventures
  - job_id: "e484d977-fe6b-47be-8dc2-78b44a2f51fa"
    job_title: "Managing Director of New Ventures"
    threshold: 7.0
    archive_threshold: 6.0
    archive_stage_id: "02014856-e5b9-4d98-8a7c-46868fda8484"
    archive_reason_id: "1f6c3fe3-c08c-4fe0-8f49-da8e632b5f91"
    founder_boost: 0.05  # 5% boost to final score if candidate is a former founder

    criteria:
      - name: "venture_experience"
        label: "Venture Experience"
        weight: "very_high"
        description: |
          Use a tiered scoring system:
          - Tier 1 (score 8-10): Top-tier global VC firms: Sequoia, Accel, a16z, Benchmark, Insight,
            NEA, General Catalyst, Flare, or equivalent
          - Tier 2 (score 6-8): Healthcare-specific VC or strong tier 2 firms: 7wire, Aegis,
            Echo Health, Frist Cressey, Health X, MVM Partners, or equivalent
          - Tier 3 (score 4-6): General consulting, banking, or private equity: Big 4 consulting,
            internal consulting at large corporations, business analyst roles
          - Negative signal (score below 4): No venture experience, only corporate strategy roles
            without external firm experience, academic or research-only background

          IMPORTANT: Candidate must be in an investing-focused role. If their background is in a
          non-investing function like talent, marketing, or operations, score below 4 regardless
          of firm prestige.

          Include "venture_tier": "Tier 1", "Tier 2", "Tier 3", or "None" in your response.

      - name: "career_trajectory"
        label: "Career Trajectory"
        weight: "high"
        description: |
          Evaluate speed of career progression relative to years since graduation.

          IMPORTANT: Reaching a senior title (Partner, Principal, VP, Director, MD) quickly is
          the strongest signal, even if the candidate had fewer total job changes.

          Scoring guidance:
          - Score 9-10: Reached Partner/Principal/MD level within 10-12 years of undergrad.
            This is exceptional velocity regardless of number of promotions.
          - Score 7-8: Reached senior individual contributor or VP level within 8-10 years,
            OR Partner level within 12-15 years with clear upward trajectory.
          - Score 5-6: Steady progression but slower pace, or senior title but took 15+ years.
          - Score 3-4: Lateral moves without upward momentum, stagnation at mid-level roles.
          - Score 1-2: Career regression, long gaps, or unclear progression.

          Do NOT penalize candidates for having only 1-2 employers if they advanced quickly
          to senior roles. Loyalty + fast advancement is a positive signal.

          Include "career_trajectory_summary": "<one sentence summary>" in your response.

      - name: "educational_background"
        label: "Educational Background"
        weight: "medium"
        description: |
          Use a tiered scoring system:
          - Tier 1 (score 8.5-10): Global elite undergraduate: Ivy League, Stanford, MIT, Caltech,
            Oxford, Cambridge, LSE, or Indian elite (IITs, IIM A/B/C, BITS Pilani, Delhi University
            St. Stephen's, Hindu College). OR elite graduate: MBA at Harvard, Stanford, Wharton,
            Kellogg, Booth, MIT Sloan, INSEAD, IIM A/B/C; PhD at top research universities;
            MD at prestigious medical schools
          - Tier 2 (score 6.5-8.4): Strong undergraduate (US Top 30, UC Berkeley, Michigan, Virginia)
            or good graduate programs (MBA top 20, strong regional programs, Master's from
            reputable institutions)
          - Tier 3 (score 4-6.4): Regional or local universities with decent reputation,
            recognized private institutions, strong performance despite lesser-known institution
          - Negative signals (score below 4): Unaccredited or questionable institutions,
            unexplained incomplete degrees, misrepresentation, certificates or extension programs only

      - name: "healthcare_experience"
        label: "Healthcare Experience"
        weight: "high"
        description: |
          Look for deep knowledge across care delivery, health tech, or healthcare services.
          Ability to develop original investment theses in healthcare.
          Penalize candidates with no healthcare exposure.

      - name: "ai_technology_fluency"
        label: "AI & Technology Fluency"
        weight: "medium"
        description: |
          Evidence of sophisticated AI tool usage beyond basic LLM prompting.
          Has built systems or workflows using AI.
          Treats AI as a core part of their analytical process.

          Also check if the candidate is a former founder or co-founder of a startup.
          Include "is_founder": true/false in your response.

  # Role 4: Director of Global Development, India
  # DUAL-TRACK SCORING SYSTEM
  - job_id: "2e254be4-be62-446a-a955-fd9732ae14d2"
    job_title: "Director of Global Development, India"
    threshold: 7.5
    archive_threshold: 6.0
    archive_stage_id: "02014856-e5b9-4d98-8a7c-46868fda8484"
    archive_reason_id: "1f6c3fe3-c08c-4fe0-8f49-da8e632b5f91"
    dual_track: true  # Special flag for dual-track scoring

    criteria:
      - name: "profile_classification"
        label: "Profile Classification"
        weight: "none"
        description: |
          STEP 1 - PROFILE DETECTION (do this first, before scoring):

          Classify the candidate into ONE of two tracks based on their PRIMARY background:

          TRACK A: Investor/Banker
          - Primary background in VC, private equity, investment banking, or management consulting
          - Has exposure to LP relationships, fund structures, or capital markets
          - Career path centered on financial services, investing, or advisory

          TRACK B: Founder/Operator
          - Primary background as a startup founder or early-stage operator
          - Has raised venture capital or built a company from scratch
          - Career path centered on building, GTM execution, and entrepreneurship

          IMPORTANT RULES:
          - If the candidate has meaningful elements of BOTH tracks, classify as "Hybrid"
            and score on BOTH tracks, then use whichever produces the HIGHER score
          - If there is insufficient profile data to classify, set "insufficient_data": true
            and provide a note explaining what information is missing

          Include in your response:
          - "track": "A", "B", or "Hybrid"
          - "track_reasoning": "<one sentence explaining why this track was chosen>"
          - "insufficient_data": true/false
          - "data_note": "<explanation if insufficient_data is true, otherwise omit>"

      # TRACK A DIMENSIONS (Investor/Banker) - weights sum to 100%
      - name: "track_a_work_experience"
        label: "Professional Work Experience"
        weight: "track_a_40"
        description: |
          FOR TRACK A CANDIDATES ONLY (skip if Track B).

          Use a tiered scoring system:
          - Tier 1 (score 8.1-10): Global top-tier investment firms including global venture firms
            (Sequoia, a16z, Accel, Lightspeed, Insight Partners, Bessemer, Matrix Partners,
            Norwest Ventures, A91, Z47, Blume Ventures, Elevation Capital, Peak XV, Nexus,
            Chiratae, Eight Roads), global investment banks (Goldman Sachs, Citigroup, JPMorgan,
            Morgan Stanley, Blackstone, KKR, Carlyle, Apollo). Extra weight if resume specifically
            mentions LP relationships, fund fundraising, or capital development.
          - Tier 2 (score 7.1-8): Top India-based venture firms or investment banks: Healthquad,
            W Health, Endiya, B Capital, Stride, Huddle, Antler, or equivalent
          - Tier 3 (score 6.1-7): Top-tier global management consulting firms: BCG, McKinsey,
            LEK, Bain, ZS
          - Tier 4 (score 4-6): General consulting or banking: Big 4 non-strategy practices,
            commercial or retail banking, internal consulting at large corporations

          Include "work_experience_tier": "Tier 1", "Tier 2", "Tier 3", "Tier 4", or "None"

      - name: "track_a_education"
        label: "Educational Background"
        weight: "track_a_25"
        description: |
          FOR TRACK A CANDIDATES ONLY (skip if Track B).

          Use a tiered scoring system:
          - Tier 1 (score 8.5-10): Global elite undergraduate (Ivy League, Stanford, MIT, Caltech,
            Oxford, Cambridge, LSE; India: IITs, IIM A/B/C, BITS Pilani, Delhi University
            St. Stephen's, Hindu College) or elite graduate (MBA at Harvard, Stanford, Wharton,
            Kellogg, Booth, MIT Sloan, INSEAD, IIM A/B/C)
          - Tier 2 (score 6.5-8.4): Strong undergrad (US Top 30, UC Berkeley, Michigan; India:
            top NITs, SRCC, XLRI, ISB Hyderabad) or good graduate programs (MBA top 20,
            professional certs CA/CFA/FRM)
          - Tier 3 (score 4-6.4): Regional universities with decent reputation

          MBA boost: If candidate has an MBA, multiply score by 1.10 and cap at 10.
          Include "education_tier": "Tier 1", "Tier 2", "Tier 3", or "None"

      - name: "track_a_lp_fundraising"
        label: "LP/Fundraising/Capital Markets"
        weight: "track_a_20"
        description: |
          FOR TRACK A CANDIDATES ONLY (skip if Track B).

          Score based on specific experience with:
          - Raising a fund or managing LP relationships
          - Private placements or capital development
          - Structuring investment vehicles
          - Direct engagement with institutional investors

          Score 8-10: Direct LP relationship management or fund fundraising experience
          Score 6-8: Supporting role in fundraising, capital markets exposure
          Score 4-6: General understanding but no direct experience
          Score below 4: No relevant experience

      - name: "track_a_healthcare"
        label: "Healthcare Experience"
        weight: "track_a_10"
        description: |
          FOR TRACK A CANDIDATES ONLY (skip if Track B).

          Score based on healthcare sector exposure:
          - Tier 1 (8-10): Healthcare-focused investing, healthcare IB, healthcare consulting
          - Tier 2 (5-7): Some healthcare deals or projects
          - Below 5: No meaningful healthcare exposure

      - name: "track_a_founder"
        label: "Founder Experience"
        weight: "track_a_5"
        description: |
          FOR TRACK A CANDIDATES ONLY (skip if Track B).

          Nice to have but NOT expected for this track. Do NOT penalize Track A candidates
          for lacking founder experience.

          Score 8-10: Has meaningful founder experience (bonus)
          Score 5: No founder experience (neutral, not a penalty)

      # TRACK B DIMENSIONS (Founder/Operator) - weights sum to 100%
      - name: "track_b_founder_quality"
        label: "Founder Experience & Quality"
        weight: "track_b_35"
        description: |
          FOR TRACK B CANDIDATES ONLY (skip if Track A).

          Evaluate founder experience quality:
          - Score 9-10: Venture-backed startup with significant capital raised ($1M+),
            evidence of successful exit, acquisition, or strong traction
          - Score 7-8: Venture-backed startup with meaningful capital raised, clear GTM execution
          - Score 5-6: Founded a real company but limited scale or bootstrapped only
          - Score 3-4: "Founder" of consulting/advisory firm or lifestyle business
          - Score below 3: No real founder experience or misrepresenting advisory as startup

          PENALIZE: Solo consulting, advisory firms, or boutique services masquerading as startups
          Include "is_founder": true/false

      - name: "track_b_gtm_commercial"
        label: "Commercial & GTM Track Record"
        weight: "track_b_25"
        description: |
          FOR TRACK B CANDIDATES ONLY (skip if Track A).

          Evidence of go-to-market execution:
          - Revenue generation and growth
          - Customer acquisition at scale
          - Partnership development
          - Market building or category creation
          - Sales leadership

          Score 8-10: Clear evidence of driving significant revenue/growth
          Score 5-7: Some commercial responsibility but limited scale
          Score below 5: No clear GTM track record

      - name: "track_b_fundraising"
        label: "Fundraising (Founder Side)"
        weight: "track_b_20"
        description: |
          FOR TRACK B CANDIDATES ONLY (skip if Track A).

          Experience raising capital as a founder:
          - Score 9-10: Raised Series A+ from institutional investors
          - Score 7-8: Raised seed round from notable angels/funds
          - Score 5-6: Raised friends & family or small angel round
          - Score 3-4: Attempted fundraising but unsuccessful
          - Score below 3: No fundraising experience

      - name: "track_b_education"
        label: "Educational Background"
        weight: "track_b_15"
        description: |
          FOR TRACK B CANDIDATES ONLY (skip if Track A).

          Use same tier system as Track A but with LOWER weight.
          Do NOT heavily penalize Track B candidates for non-elite education
          if they have strong founder credentials.

          Include "education_tier": "Tier 1", "Tier 2", "Tier 3", or "None"

      - name: "track_b_healthcare"
        label: "Healthcare Experience"
        weight: "track_b_5"
        description: |
          FOR TRACK B CANDIDATES ONLY (skip if Track A).

          Nice to have but NOT expected for this track.
          Score 5 (neutral) if no healthcare experience.

      # ALWAYS INCLUDE
      - name: "career_summary"
        label: "Career Summary"
        weight: "none"
        description: |
          ALWAYS INCLUDE regardless of track.
          Include "career_summary": "<one sentence career summary>"

  # Role 5: Managing Director of Ventures, India
  - job_id: "d72d8750-c143-4889-94f2-02448d33c43c"
    job_title: "Managing Director of Ventures, India"
    threshold: 7.5
    archive_threshold: 6.0
    archive_stage_id: "02014856-e5b9-4d98-8a7c-46868fda8484"
    archive_reason_id: "1f6c3fe3-c08c-4fe0-8f49-da8e632b5f91"
    founder_boost: 0.05  # 5% boost if candidate is a founder
    percentage_weights: true  # Use explicit percentage weights

    criteria:
      - name: "venture_experience"
        label: "Venture Experience"
        weight: "pct_40"
        description: |
          Tier 1 (score 8.2-10): Top-tier global or India VC firms: Sequoia, a16z, Accel,
          Lightspeed, Insight Partners, Bessemer, Matrix Partners, Norwest Ventures, A91,
          Z47, Blume Ventures, Elevation Capital, Peak XV, Nexus, Chiratae, Eight Roads,
          or equivalent.

          Tier 2 (score 7.1-8.1): Strong India-based venture firms or top-tier global
          investment firms: Healthquad, W Health, Endiya, B Capital, Stride, Huddle,
          Antler, or equivalent.

          Tier 3 (score 4-7): General consulting, banking, or PE: Big 4 consulting,
          internal consulting at large corporations, business analyst roles, corporate
          development.

          Below 4: No venture experience, only corporate strategy without external firm
          experience, academic/research only.

          CRITICAL RULE: If the candidate's background is in a non-investing function
          (talent, marketing, operations, HR, recruiting) — score below 4 regardless
          of firm prestige.

          Include "venture_tier": "Tier 1", "Tier 2", "Tier 3", or "Below" in your response.

      - name: "career_trajectory"
        label: "Career Trajectory"
        weight: "pct_25"
        description: |
          Evaluate speed of career progression and upward mobility.

          Positive signals:
          - Rapid advancement and progressive responsibility
          - At least one promotion at the same company
          - Transitions showing intentionality and learning velocity
          - Examples: Associate → VP → Principal → Director → MD

          Negative signals:
          - Lateral moves without upward momentum
          - Career stagnation
          - Long stints (5+ years) at large corporations without advancement
          - Same role for 6+ years
          - Candidates with 25+ years of experience (may be overqualified)

          Include "career_trajectory_summary": "<one sentence summary>" in your response.

      - name: "educational_background"
        label: "Educational Background"
        weight: "pct_15"
        description: |
          Tier 1 (score 8.5-10): Ivy League, Stanford, MIT, Caltech, Oxford, Cambridge,
          LSE, IITs, IIM A/B/C, BITS Pilani, Delhi University St. Stephen's, Hindu College.
          OR elite graduate: MBA at HBS, Stanford, Wharton, Kellogg, Booth, MIT Sloan,
          INSEAD, IIM A/B/C; PhD at top research universities; MD at prestigious
          medical schools.

          Tier 2 (score 6.5-8.4): US Top 30, UC Berkeley, Michigan, Virginia, or MBA
          top 20, strong regional programs, reputable Master's programs.

          Tier 3 (score 4-6.4): Regional/local universities with decent reputation,
          recognized private institutions.

          Below 4: Unaccredited institutions, unexplained incomplete degrees,
          certificates or extension programs only.

          Include "education_tier": "Tier 1", "Tier 2", "Tier 3", or "Below" in your response.

      - name: "healthcare_experience"
        label: "Healthcare Experience"
        weight: "pct_10"
        description: |
          Deep knowledge across care delivery, health tech, or healthcare services.
          Prior healthcare experience is a HARD REQUIREMENT — score below 4 if
          entirely absent.

          India healthcare market knowledge is a positive signal — score higher if
          candidate has experience with Indian healthcare systems, health tech
          startups, or emerging market healthcare dynamics.

          Score 8-10: Deep healthcare investing or operating experience
          Score 6-8: Healthcare sector exposure through deals or advisory
          Score 4-6: Some healthcare adjacent experience
          Below 4: No healthcare experience (hard penalty)

      - name: "ai_tech_fluency"
        label: "AI & Tech Fluency"
        weight: "pct_10"
        description: |
          Score 7+ ONLY if there is explicit evidence of AI systems-building or
          workflow automation beyond basic LLM usage. Has built systems or
          workflows using AI. Treats AI as a core part of their analytical process.

          Score 8-10: Built AI-powered systems, automation workflows, or tools
          Score 6-7: Active user of AI tools with evidence of sophisticated usage
          Score 4-6: Basic AI/LLM usage mentioned
          Below 4: No evidence of AI fluency

          Also check if the candidate is a former founder or co-founder of a startup.
          Include "is_founder": true/false in your response.

      - name: "location_signal"
        label: "Location Signal"
        weight: "none"
        description: |
          Determine the candidate's location and India connection.
          Include "location_signal": "India-based", "India experience", or "No India signal"
          in your response.

          India-based: Currently living/working in India
          India experience: Has worked in India previously or has strong India ties
          No India signal: No apparent India connection

  # Role 6: Associate, AI Buyouts
  - job_id: "7328b134-a2ee-4036-8f7b-0c6af7f56014"
    job_title: "Associate, AI Buyouts"
    threshold: 7.0
    archive_threshold: 6.0
    archive_stage_id: "02014856-e5b9-4d98-8a7c-46868fda8484"
    archive_reason_id: "1f6c3fe3-c08c-4fe0-8f49-da8e632b5f91"
    founder_boost: false

    scoring_prompt: |
      You are an expert private equity recruiter evaluating candidates for an
      Associate, AI Buyouts role at Redesign Health, a healthcare venture studio
      launching an AI-driven healthcare buyout fund.

      This is an EARLY CAREER role targeting candidates with 2-5 years of experience,
      typically coming from investment banking or a first PE role.

      A sample strong candidate (score ~9): Duke undergrad, JPMorgan investment
      banking analyst, PE role at GI Partners.

      SCORING DIMENSIONS (must sum to 100%):

      DIMENSION 1 — Private Equity / M&A Experience (40%)
      Tier 1 (9-10): Top-tier global PE firm (Carlyle, Welsh Carson, KKR, Blackstone,
        CVC) OR investment banking at Goldman/JPMorgan + PE experience = 10.
      Tier 2 (7-8.9): Healthcare-specific PE or strong tier 2 firms: Shore Capital,
        Incline, Altaris, Windrose, Lone Pine, Avista, Water Street, Great Hill.
      Tier 3 (5-6.9): Boutique or non-healthcare PE firms.
      Below 4: No PE experience, corporate strategy only, academic/research only.
      CRITICAL RULE: If background is non-investing (talent, marketing, ops, HR,
        recruiting) — score below 4 regardless of firm prestige.

      DIMENSION 2 — Career Trajectory (15%)
      Positive: Rapid advancement, at least one promotion at same company,
        intentional transitions showing learning velocity (e.g. Analyst > Associate
        > Senior Associate).
      Negative: Lateral moves without upward momentum, stagnation, same role 4+
        years, 10+ years total experience (too senior for this role).

      DIMENSION 3 — Healthcare Experience (15%)
      Deep knowledge across care delivery, health tech, or healthcare services.
      Ability to develop original investment theses in healthcare.
      Score below 4 if healthcare is entirely absent from background.

      DIMENSION 4 — Educational Background (25%)
      Tier 1 (8.5-10): Ivy League, Stanford, MIT, Caltech, Oxford, Cambridge, LSE,
        IITs, IIM A/B/C, BITS Pilani, Delhi University (St. Stephen's, Hindu College).
        OR elite graduate: MBA at HBS, Stanford, Wharton, Kellogg, Booth, MIT Sloan,
        INSEAD, IIM A/B/C; PhD at top research universities; MD at prestigious
        medical schools.
      Tier 2 (6.5-8.4): US Top 30, UC Berkeley, Michigan, Virginia, MBA top 20,
        strong regional programs, reputable Master's programs.
      Tier 3 (4-6.4): Regional/local universities, recognized private institutions.
      Below 4: Unaccredited, incomplete degrees, certificates or extension only.

      DIMENSION 5 — AI & Tech Fluency (5%)
      Evidence of sophisticated AI tool usage beyond basic LLM prompting.
      Has built systems or workflows using AI.
      Score 7+ ONLY if there is explicit evidence of AI systems-building or
        workflow automation.

      SCORING INSTRUCTIONS:
      - Weight scores: D1×0.40 + D2×0.15 + D3×0.15 + D4×0.25 + D5×0.05
      - Apply CRITICAL RULE for Dimension 1 before scoring anything else
      - Do not give benefit of the doubt — score only on explicit evidence in resume

      Return JSON only:
      {
        "score": <weighted total, 1 decimal>,
        "dimension_scores": {
          "pe_experience": <1-10>,
          "career_trajectory": <1-10>,
          "healthcare_experience": <1-10>,
          "educational_background": <1-10>,
          "ai_tech_fluency": <1-10>
        },
        "reasoning": "<2-3 sentences explaining the score>",
        "recommendation": "<Strong Yes | Yes | No>",
        "red_flags": "<any critical disqualifiers>"
      }

  # Role 7: Managing Director, Southeast Asia
  - job_id: "632c7bdf-433d-4b69-81a2-b8950d6656e1"
    job_title: "Managing Director, Southeast Asia"
    threshold: 7.0
    archive_threshold: 5.5
    archive_stage_id: "02014856-e5b9-4d98-8a7c-46868fda8484"
    archive_reason_id: "1f6c3fe3-c08c-4fe0-8f49-da8e632b5f91"
    dual_track: true

    scoring_prompt: |
      You are an expert talent screener for Redesign Health, a healthcare venture studio.
      Score this candidate for the Managing Director, Southeast Asia role.

      Candidate Profile:
      - Current Role: {current_role}
      - Current Company: {current_company}
      - Past Role: {past_role}
      - Past Company: {past_company}
      - LinkedIn Summary: {linkedin_summary}
      - Experience: {experience}
      - Education: {education}
      - Summary: {summary}

      ## INSTRUCTIONS

      This role has TWO valid candidate profiles. Follow the dual-track scoring system below exactly.

      ---

      ### STEP 1 — PROFILE CLASSIFICATION (do this first, before scoring)

      Classify the candidate into ONE of two tracks based on their PRIMARY background:

      TRACK A: Investor / Banker
      - Primary background in VC, private equity, investment banking, or management consulting
      - Has exposure to LP relationships, fund structures, or capital markets
      - Career path centered on financial services, investing, or advisory

      TRACK B: Founder / Operator
      - Primary background as a startup founder or early-stage operator
      - Has raised venture capital or built a company from scratch
      - Career path centered on building, GTM execution, and entrepreneurship

      IMPORTANT RULES:
      - If the candidate has meaningful elements of BOTH tracks, classify as "Hybrid"
        and score on BOTH tracks, then use whichever produces the HIGHER score
      - If there is insufficient profile data to classify, flag "insufficient_data": true
        and explain what is missing

      Include in your response:
      - "track": "A", "B", or "Hybrid"
      - "track_reasoning": one sentence explaining why this track was chosen
      - "insufficient_data": true or false
      - "data_note": explanation if insufficient_data is true, otherwise omit

      ---

      ### STEP 2 — SCORE ON THE APPROPRIATE TRACK

      Score ONLY the dimensions for the candidate's assigned track.
      For Hybrid candidates, score both tracks and use the higher composite score.

      NOTE ON IRRELEVANT FUNCTIONS: Candidates whose primary career background is in
      talent, marketing, operations, or other non-investing/non-founding functions
      should score below 4 overall regardless of track.

      ---

      ## TRACK A DIMENSIONS (Investor / Banker)
      ## Track A weights sum to 100%: Work Experience 40%, Education 25%, LP/Fundraising 20%, Healthcare 10%, Founder Bonus 5%

      ### Track A — Professional Work Experience (weight: 40%)

      Use a tiered scoring system:

      Tier 1 (score 8.1–10): Global top-tier investment firms or sovereign wealth:
        - Global VC: a16z, Accel, Lightspeed, Insight Partners, Bessemer, Matrix Partners
        - SEA VC: Sequoia Capital Southeast Asia, Grab Ventures, Gojek Ventures
        - Sovereign Wealth: Temasek, GIC (Singapore), Khazanah Nasional (Malaysia)
        - Global Investment Banks: Goldman Sachs, Citigroup, JPMorgan, Morgan Stanley
        - Global PE: Blackstone, KKR, Carlyle, Apollo
        - Extra weight if resume specifically mentions LP relationships, fund fundraising,
          or capital development

      Tier 2 (score 7.1–8): Top SEA-based venture or healthcare-focused firms:
        - SEA VC: Heritas Capital, Pavilion Capital, B Capital Group, OrionHealthcare,
          IMO Ventures, 500 Southeast Asia, Golden Gate Ventures, Monk's Hill Ventures,
          Iterative, Wavemaker Partners, Vertex Ventures SE Asia, Openspace Ventures,
          Jungle Ventures, Northstar Group, East Ventures
        - SEA Family Office / Strategic: Salim Group, Ayala Corporation, CP Group,
          YTL Group, Lippo Group
        - Global growth equity with SEA presence: General Atlantic, Warburg Pincus

      Tier 3 (score 6.1–7): Top-tier global management consulting firms:
        - BCG, McKinsey, LEK, Bain, ZS Associates

      Tier 4 (score 4–6): General consulting or banking:
        - Big 4 non-strategy practices, commercial or retail banking,
          internal consulting at large corporations, business analyst roles

      Negative signals (score below 4):
        - No consulting, banking, or investment experience
        - Only corporate strategy roles without external firm experience
        - Academic or research-only background

      Include "work_experience_tier": "Tier 1", "Tier 2", "Tier 3", "Tier 4", or "None"

      ---

      ### Track A — Educational Background (weight: 25%)

      Tier 1 (score 8.5–10):
        - Global elite undergraduate: Ivy League, Stanford, MIT, Caltech, Oxford,
          Cambridge, LSE
        - SEA elite: NUS, NTU, INSEAD Asia Campus, SMU (Singapore Management University)
        - Elite graduate (MBA): Harvard, Stanford, Wharton, Kellogg, Booth,
          MIT Sloan, INSEAD, IIM A/B/C

      Tier 2 (score 6.5–8.4):
        - Strong undergrad: US Top 30, UC Berkeley, University of Michigan
        - SEA strong: Chulalongkorn University, Mahidol University (Thailand),
          University of Indonesia (UI), Universitas Gadjah Mada (UGM),
          Ateneo de Manila University, De La Salle University (Philippines),
          University of Malaya / Universiti Malaya (Malaysia),
          Vietnam National University, Ho Chi Minh City University of Technology
        - Executive / MBA programs: NUS Business School, Asian Institute of
          Management (AIM), Sasin School of Management, IPMI International
          Business School

      Tier 3 (score 4–6.4):
        - Regional universities with decent reputation

      MBA boost: If the candidate holds an MBA, multiply their education score
      by 1.10, capped at 10.

      Include "education_tier": "Tier 1", "Tier 2", "Tier 3", or "None"

      ---

      ### Track A — LP / Fundraising / Capital Markets Experience (weight: 20%)

      Score based on specific experience with:
      - Raising a fund or managing LP relationships
      - Private placements or capital development
      - Structuring investment vehicles
      - Direct engagement with institutional investors

      Score 8–10: Direct LP relationship management or fund fundraising experience
      Score 6–7: Supporting role in fundraising or capital markets exposure
      Score 4–5: General understanding but no direct experience
      Score below 4: No relevant experience

      ---

      ### Track A — Healthcare Sector Experience (weight: 10%)

      Tier 1 (score 8–10): Healthcare-focused investing, healthcare IB,
        or dedicated healthcare consulting practice
      Tier 2 (score 5–7): Some healthcare deals, projects, or exposure
      Below 5: No meaningful healthcare experience

      ---

      ### Track A — Founder Experience (weight: 5%, bonus only)

      This is a NICE-TO-HAVE. Do NOT penalize Track A candidates for lacking it.

      Score 8–10: Has meaningful founder experience (bonus)
      Score 5: No founder experience (neutral — this is the default)

      ---

      ## TRACK B DIMENSIONS (Founder / Operator)
      ## Track B weights sum to 100%: Founder Quality 35%, GTM/Commercial 25%, Fundraising 20%, Education 15%, Healthcare 5%

      ### Track B — Founder Experience & Quality (weight: 35%)

      Score 9–10: Venture-backed startup with significant capital raised ($1M+),
        evidence of successful exit, acquisition, or strong traction
      Score 7–8: Venture-backed startup with meaningful capital raised,
        clear GTM execution
      Score 5–6: Founded a real company but limited scale or bootstrapped only
      Score 3–4: "Founder" of consulting/advisory firm or lifestyle business
      Score below 3: No real founder experience, or misrepresenting advisory as startup

      PENALIZE: Solo consulting, advisory firms, or boutique services
      masquerading as startups.

      Include "is_founder": true or false

      ---

      ### Track B — Commercial & GTM Track Record (weight: 25%)

      Evidence of go-to-market execution:
      - Revenue generation and growth
      - Customer acquisition at scale
      - Partnership development
      - Market building or category creation
      - Sales leadership

      Score 8–10: Clear evidence of driving significant revenue or growth
      Score 5–7: Some commercial responsibility but limited scale
      Score below 5: No clear GTM track record

      ---

      ### Track B — Fundraising, Founder Side (weight: 20%)

      Score 9–10: Raised Series A or later from institutional investors
      Score 7–8: Raised seed round from notable angels or funds
      Score 5–6: Raised friends & family or small angel round
      Score 3–4: Attempted fundraising but unsuccessful
      Score below 3: No fundraising experience

      ---

      ### Track B — Educational Background (weight: 15%)

      Use the same tier system as Track A education above.
      Do NOT heavily penalize Track B candidates for non-elite education
      if they have strong founder credentials.

      Include "education_tier": "Tier 1", "Tier 2", "Tier 3", or "None"

      ---

      ### Track B — Healthcare Sector Experience (weight: 5%, bonus only)

      This is a NICE-TO-HAVE. Do NOT penalize Track B candidates for lacking it.
      Score 5 (neutral) if no healthcare experience.

      ---

      ## STEP 3 — CAREER SUMMARY

      Always include regardless of track:
      - "career_summary": one sentence summarizing the candidate's background

      ---

      ## STEP 4 — FINAL SCORE

      Compute a weighted composite score (0–10) using the appropriate track weights.
      For Hybrid candidates, compute both and use the higher score.

      Respond ONLY in valid JSON. Do not include any explanation outside the JSON.

      Required JSON structure:
      {
        "score": <composite score 0-10, 1 decimal place>,
        "track": "A" | "B" | "Hybrid",
        "track_reasoning": "string",
        "insufficient_data": true | false,
        "data_note": "string or omit if not applicable",
        "career_summary": "string",
        "is_founder": true | false,
        "dimension_scores": {
          "work_experience": <0-10>,
          "education": <0-10>,
          "lp_fundraising": <0-10>,
          "healthcare": <0-10>,
          "founder_experience": <0-10>
        },
        "work_experience_tier": "Tier 1" | "Tier 2" | "Tier 3" | "Tier 4" | "None",
        "education_tier": "Tier 1" | "Tier 2" | "Tier 3" | "None",
        "reasoning": "<2-3 sentences explaining the overall score and fit>",
        "recommendation": "Strong Yes" | "Yes" | "Maybe" | "No"
      }

