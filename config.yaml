    criteria:
      - name: "pe_experience"
        label: "Private Equity/M&A Experience"
        weight: "pct_35"
        description: |
          Tier 1 (score 9-10): Experience at top-tier global PE firms: Carlyle, Welsh Carson,
          KKR, Blackstone, CVC, or equivalent caliber firm.

          Tier 2 (score 7-8.9): Healthcare-specific PE or strong tier 2 firms: Shore Capital,
          Incline Partners, Altaris, Windrose, Lone Pine, Avista, Water Street, Great Hill
          Partners or equivalent.

          Tier 3 (score 5-6.9): Boutique tier 3 PE firms or non-healthcare firms.

          Below 4: No private equity experience, only corporate strategy without external firm
          experience, academic/research only.

          CRITICAL RULE: If the candidate's background is in a non-investing function
          (talent, marketing, operations, HR, recruiting) — score this dimension below 4
          regardless of firm prestige. Investing focus is mandatory.

          Include "pe_tier": "Tier 1", "Tier 2", "Tier 3", or "Below" in your response.

      - name: "career_trajectory"
        label: "Career Trajectory"
        weight: "pct_25"
        description: |
          Evaluate speed of career progression and upward mobility.

          Positive signals:
          - Rapid advancement with progressive responsibility
          - At least one promotion at the same company
          - Transitions showing intentionality and learning velocity
          - Examples: Associate → VP → Principal → Director → MD

          Negative signals:
          - Lateral moves without upward momentum
          - Career stagnation
          - Long stints (5+ years) at large corporations without advancement
          - Same role for 4+ years

          Include "career_trajectory_summary": "<one sentence summary>" in your response.

      - name: "healthcare_experience"
        label: "Healthcare Experience"
        weight: "pct_20"
        description: |
          Deep knowledge across care delivery, health tech, or healthcare services.
          Ability to develop original investment theses in healthcare.

          Score below 4 if healthcare is entirely absent from background.

          Score 8-10: Deep healthcare investing or operating experience
          Score 6-8: Healthcare sector exposure through deals or advisory
          Score 4-6: Some healthcare adjacent experience
          Below 4: No healthcare experience (hard penalty)

      - name: "educational_background"
        label: "Educational Background"
        weight: "pct_15"
        description: |
          Tier 1 (score 8.5-10): Ivy League, Stanford, MIT, Caltech, Oxford, Cambridge, LSE,
          IITs, IIM A/B/C, BITS Pilani, Delhi University St. Stephen's, Hindu College.
          OR elite graduate: MBA at HBS, Stanford, Wharton, Kellogg, Booth, MIT Sloan,
          INSEAD, IIM A/B/C; PhD at top research universities; MD at prestigious medical schools.

          Tier 2 (score 6.5-8.4): US Top 30, UC Berkeley, Michigan, Virginia, MBA top 20,
          strong regional programs, reputable Master's programs.

          Tier 3 (score 4-6.4): Regional/local universities with decent reputation,
          recognized private institutions.

          Below 4: Unaccredited institutions, unexplained incomplete degrees, certificates
          or extension programs only.

          Include "education_tier": "Tier 1", "Tier 2", "Tier 3", or "Below" in your response.

      - name: "ai_tech_fluency"
        label: "AI & Tech Fluency"
        weight: "pct_5"
        description: |
          Evidence of sophisticated AI tool usage beyond basic LLM prompting.
          Has built systems or workflows using AI.
          Treats AI as a core part of their analytical process.

          Score 6+ ONLY if there is explicit evidence of AI systems-building or
          workflow automation.

          Score 8-10: Built AI-powered systems, automation workflows, or tools
          Score 6-7: Active user of AI tools with evidence of sophisticated usage
          Score 4-6: Basic AI/LLM usage mentioned
          Below 4: No evidence of AI fluency

          Also check if the candidate is a former founder or co-founder of a startup.
          Include "is_founder": true/false in your response.

